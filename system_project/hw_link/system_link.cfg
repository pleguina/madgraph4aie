# ============================================================================
# System Link Configuration for 80-Pipeline Packet-Switched Architecture
# VCK190: 10 column-groups × 8 rows = 80 total pipelines
# Each group has one PLIO in (psp_in_0..9) and one PLIO out (me2_out_0..9)
# PLIO columns (g*4+6): 6,10,14,18,22,26,30,34,38,42
# ============================================================================

[connectivity]
# ============================================================================
# Kernel Instantiation: 10 copies of each PL kernel (one per column-group)
# ============================================================================
nk=mm2s_pkt_gen:10:mm2s_0.mm2s_1.mm2s_2.mm2s_3.mm2s_4.mm2s_5.mm2s_6.mm2s_7.mm2s_8.mm2s_9
nk=s2mm_pkt_parser:10:s2mm_0.s2mm_1.s2mm_2.s2mm_3.s2mm_4.s2mm_5.s2mm_6.s2mm_7.s2mm_8.s2mm_9

# ============================================================================
# Stream Connections: MM2S → AIE PLIO input (10 groups)
# ============================================================================
stream_connect=mm2s_0.axis_out:ai_engine_0.psp_in_0
stream_connect=mm2s_1.axis_out:ai_engine_0.psp_in_1
stream_connect=mm2s_2.axis_out:ai_engine_0.psp_in_2
stream_connect=mm2s_3.axis_out:ai_engine_0.psp_in_3
stream_connect=mm2s_4.axis_out:ai_engine_0.psp_in_4
stream_connect=mm2s_5.axis_out:ai_engine_0.psp_in_5
stream_connect=mm2s_6.axis_out:ai_engine_0.psp_in_6
stream_connect=mm2s_7.axis_out:ai_engine_0.psp_in_7
stream_connect=mm2s_8.axis_out:ai_engine_0.psp_in_8
stream_connect=mm2s_9.axis_out:ai_engine_0.psp_in_9

# ============================================================================
# Stream Connections: AIE PLIO output → S2MM (10 groups)
# ============================================================================
stream_connect=ai_engine_0.me2_out_0:s2mm_0.axis_in
stream_connect=ai_engine_0.me2_out_1:s2mm_1.axis_in
stream_connect=ai_engine_0.me2_out_2:s2mm_2.axis_in
stream_connect=ai_engine_0.me2_out_3:s2mm_3.axis_in
stream_connect=ai_engine_0.me2_out_4:s2mm_4.axis_in
stream_connect=ai_engine_0.me2_out_5:s2mm_5.axis_in
stream_connect=ai_engine_0.me2_out_6:s2mm_6.axis_in
stream_connect=ai_engine_0.me2_out_7:s2mm_7.axis_in
stream_connect=ai_engine_0.me2_out_8:s2mm_8.axis_in
stream_connect=ai_engine_0.me2_out_9:s2mm_9.axis_in

# ============================================================================
# Memory Assignment (VCK190 uses single DDR interface)
# ============================================================================
# MM2S kernels: input buffers (PSP data)
sp=mm2s_0.psp_buffer:DDR
sp=mm2s_1.psp_buffer:DDR
sp=mm2s_2.psp_buffer:DDR
sp=mm2s_3.psp_buffer:DDR
sp=mm2s_4.psp_buffer:DDR
sp=mm2s_5.psp_buffer:DDR
sp=mm2s_6.psp_buffer:DDR
sp=mm2s_7.psp_buffer:DDR
sp=mm2s_8.psp_buffer:DDR
sp=mm2s_9.psp_buffer:DDR

# S2MM kernels: output buffers (ME² results)
sp=s2mm_0.result_buffer:DDR
sp=s2mm_1.result_buffer:DDR
sp=s2mm_2.result_buffer:DDR
sp=s2mm_3.result_buffer:DDR
sp=s2mm_4.result_buffer:DDR
sp=s2mm_5.result_buffer:DDR
sp=s2mm_6.result_buffer:DDR
sp=s2mm_7.result_buffer:DDR
sp=s2mm_8.result_buffer:DDR
sp=s2mm_9.result_buffer:DDR

[advanced]
# ============================================================================
# Advanced Compiler Options
# ============================================================================
param=compiler.addOutputTypes=hw_export
param=compiler.enableMultiCuPartitioning=true
param=compiler.errorOnHoldViolation=false

# Save intermediate files for debugging
param=compiler.preserveHlsOutput=true
param=compiler.generateReports=true

# Clock frequency: 500 MHz for all kernels
param=compiler.defaultClockFrequencyMHz=500

[vivado]
# ============================================================================
# Vivado Implementation Strategy
# ============================================================================
# Use performance-optimized strategy for high-speed design
prop=run.impl_1.strategy=Performance_ExploreWithRemap

# Note: Custom TCL hooks can be added after successful first build
# prop=run.impl_1.STEPS.OPT_DESIGN.TCL.PRE={report_timing_summary -file timing_opt.rpt}
# prop=run.impl_1.STEPS.ROUTE_DESIGN.TCL.POST={report_timing_summary -file timing_route.rpt}
